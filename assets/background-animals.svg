<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!-- perro: cabeza + orejas caídas -->
  <g transform="translate(20,20)" fill="#0ea37d" opacity="0.09">
    <circle cx="20" cy="24" r="16"/>
    <ellipse cx="6" cy="12" rx="7" ry="10" transform="rotate(-25 6 12)"/>
    <ellipse cx="34" cy="12" rx="7" ry="10" transform="rotate(25 34 12)"/>
  </g>

  <!-- gato: cabeza + orejas triangulares -->
  <g transform="translate(150,10)" fill="#ff6b4a" opacity="0.09">
    <circle cx="20" cy="26" r="15"/>
    <polygon points="6,14 10,-2 16,16"/>
    <polygon points="34,14 30,-2 24,16"/>
  </g>

  <!-- pata -->
  <g transform="translate(60,110)" fill="#ffb100" opacity="0.10">
    <circle cx="12" cy="16" r="9"/>
    <circle cx="1" cy="4" r="4"/>
    <circle cx="9" cy="-4" r="4"/>
    <circle cx="17" cy="-4" r="4"/>
    <circle cx="24" cy="4" r="4"/>
  </g>

  <!-- conejo: orejas largas -->
  <g transform="translate(190,120)" fill="#3ec1e8" opacity="0.10">
    <ellipse cx="8" cy="0" rx="5" ry="16" transform="rotate(-10 8 0)"/>
    <ellipse cx="24" cy="0" rx="5" ry="16" transform="rotate(10 24 0)"/>
    <circle cx="16" cy="24" r="14"/>
  </g>

  <!-- ave: cuerpo + pico -->
  <g transform="translate(30,180)" fill="#0ea37d" opacity="0.09">
    <ellipse cx="16" cy="16" rx="15" ry="13" transform="rotate(15 16 16)"/>
    <polygon points="1,10 -8,7 1,17"/>
  </g>

  <!-- pata pequeña -->
  <g transform="translate(150,200)" fill="#ff6b4a" opacity="0.09">
    <circle cx="9" cy="12" r="7"/>
    <circle cx="1" cy="3" r="3"/>
    <circle cx="7" cy="-3" r="3"/>
    <circle cx="13" cy="-3" r="3"/>
    <circle cx="18" cy="3" r="3"/>
  </g>
</svg>
